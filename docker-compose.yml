

services:

  mongodb:
    image: mongo:7.0
    container_name: sentinelx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sentinelx
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sentinelx-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      LOG_LEVEL: DEBUG
    volumes:
      - .:/app
      - /app/venv
    command: ["python", "-c", "from config.logging import setup_logging; setup_logging(); import time; time.sleep(9999)"]

volumes:
  mongodb_data: